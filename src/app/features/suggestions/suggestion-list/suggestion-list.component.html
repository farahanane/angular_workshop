<div class="container my-4">

  <!-- Title + Add Button -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">
      Liste des suggestions
    </h2>

    <button
      class="btn btn-success"
      routerLink="/suggestions/add">
      ➕ Ajouter suggestion
    </button>
  </div>

  <!-- Search bar -->
  <input
    type="text"
    class="form-control mb-4"
    placeholder="Rechercher une suggestion"
    [(ngModel)]="searchText"
  />

  <!-- Suggestions list -->
  <div *ngFor="let s of suggestions">

    <div
      class="card shadow-sm mb-4"
      *ngIf="matchesSearch(s)"
    >
      <div class="card-body">

        <!-- Title -->
        <h5 class="card-title fw-bold">
          {{ s.title }}
        </h5>

        <!-- Category + Date -->
        <small class="text-primary fw-semibold">
          {{ s.category }}
        </small>
        <small class="text-muted ms-2">
          {{ s.date | date:'dd MMM yyyy' }}
        </small>

        <!-- Description -->
        <p class="mt-3">
          {{ s.description }}
        </p>

        <!-- Status badge -->
        <span
          class="badge"
          [ngClass]="{
            'bg-success': s.status === 'acceptee',
            'bg-danger': s.status === 'refusee',
            'bg-warning text-dark': s.status === 'pending'
          }"
        >
          {{ s.status | uppercase }}
        </span>

        <!-- Action buttons -->
        <div class="mt-3 d-flex flex-wrap gap-2">

          <!-- LIKE -->
          <button
            class="btn btn-primary"
            (click)="likeSuggestion(s)">
            👍 Like {{ s.nbLikes }}
          </button>

          <!-- DETAILS -->
          <button
            class="btn btn-outline-info"
            [routerLink]="['/suggestions', s.id]">
            🔍 Details
          </button>

          <!-- DELETE -->
          <button
            class="btn btn-danger"
            (click)="deleteSuggestion(s.id)">
            🗑 Supprimer
          </button>

        </div>

      </div>
    </div>

  </div>

</div>
